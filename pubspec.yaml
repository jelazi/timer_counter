name: timer_counter
description: "Time tracking app for desktop and mobile."
publish_to: 'none'
version: 1.0.4+5

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Local Storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0

  # Localization
  easy_localization: ^3.0.7

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  google_fonts: ^8.0.2
  fl_chart: ^1.1.1
  intl: ^0.20.2

  # System Tray
  system_tray: ^2.0.3
  window_manager: ^0.5.1
  launch_at_startup: ^0.5.1

  # Utils
  uuid: ^3.0.6
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  collection: ^1.19.1
  file_picker: ^10.3.10

  # PDF/CSV Export
  pdf: ^3.11.2
  printing: ^5.13.5
  csv: ^7.1.0

  # Provider for dependency injection
  provider: ^6.1.2
  http: ^1.6.0
  sqlite3: ^3.1.6
  package_info_plus: ^9.0.0

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.14
  hive_ce_generator: ^1.7.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  windows:
    generate: true
    icon_size: 48
  linux:
    generate: true
  web:
    generate: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
